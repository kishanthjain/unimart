<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | UniMart</title>

  <link rel="stylesheet" href="g.css">
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<a href="index.html" class="back-home">← Back to UniMart</a>

<section class="auth-page">

  <div class="auth-left">
    <h1>Welcome Back</h1>
    <p>
      Login to your UniMart account to manage your cart, wishlist,
      orders, and student marketplace profile.
    </p>

    <div class="auth-points">
      <span><i class="fa-solid fa-cart-shopping"></i> View your cart</span>
      <span><i class="fa-solid fa-heart"></i> Access your wishlist</span>
      <span><i class="fa-solid fa-user"></i> Manage your account</span>
    </div>
  </div>

  <div class="auth-card">
    <h2>Login</h2>
    <p class="auth-subtitle">Enter your account details</p>

    <form id="loginForm">
      <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" name="email" placeholder="Email Address" required>
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <button class="auth-btn" type="submit">Login</button>

      <p class="switch-auth">
        Don't have an account?
        <a href="register.html">Register</a>
      </p>
    </form>
  </div>

</section>

<script src="auth.js"></script>
</body>
</html>
