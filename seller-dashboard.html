<html>
<head>
  <title>Seller Dashboard | UniMart</title>

  <div class="page-hero">

  </div>

  <div class="dashboard-grid">
    <div class="dash-card">📌 Active Listings <h2>0</h2></div>

  <div class="empty-box">

    <a href="contact-requests.html" class="auth-btn">
      View Contact Requests
    </a>

  <div id="sellerOrders"></div>

<div id="sellerListings"></div>
</div>
<script src="marketplace.js"></script>
